<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Screen Share - Phase 2 (live detection)</title>
  <style>
    body {
      margin: 0; padding: 16px; background: #111; color: #eee;
      font-family: system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    canvas { width: 100%; max-width: 640px; background: #000; border-radius: 8px; }
    video { position: fixed; top: 0; left: 0; width: 2px; height: 2px; opacity: 0; pointer-events: none; }
    button {
      font-size: 18px; padding: 12px 24px; border: none; border-radius: 8px;
      background: #2dd76f; color: #04210f; font-weight: 700;
    }
    button:disabled { background: #444; color: #999; }
    #status { font-size: 14px; min-height: 20px; text-align: center; max-width: 640px; }
  </style>
</head>
<body>
  <h2>Phase 2: live screen detection</h2>
  <button id="startBtn" disabled>Loading vision library...</button>
  <video id="video" playsinline autoplay muted></video>
  <canvas id="view"></canvas>
  <p id="status">Loading OpenCV (about 8 MB on first open)...</p>

  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>

  <script>
    const video = document.getElementById("video");
    const view = document.getElementById("view");
    const startBtn = document.getElementById("startBtn");
    const statusEl = document.getElementById("status");
    const ctx = view.getContext("2d", { willReadFrequently: true });

    const PROC_W = 640;
    let cvReady = false;
    let streaming = false;
    let KERNEL = null;

    function setStatus(msg) { statusEl.textContent = msg; }

    // Wait for OpenCV's runtime to be REALLY initialized. Checking only that
    // functions like cv.Mat exist is not enough - they can exist before the
    // WebAssembly engine has started, and calling them then crashes with
    // "Out of bounds call_indirect". We wait for the official ready signal.
    function onOpenCvReady() {
      if (!window.cv) { setTimeout(onOpenCvReady, 50); return; }
      if (typeof cv.then === "function") {       // promise-style build
        cv.then((m) => { window.cv = m; onCvReady(); });
      } else if (cv.calledRun) {                 // runtime already initialized
        onCvReady();
      } else {                                   // wait for the init callback
        cv["onRuntimeInitialized"] = onCvReady;
      }
    }

    function onCvReady() {
      try {
        KERNEL = cv.Mat.ones(3, 3, cv.CV_8U);
        cvReady = true;
        startBtn.disabled = false;
        startBtn.textContent = "Start camera";
        setStatus('Ready. Tap "Start camera" and allow access.');
      } catch (err) {
        setStatus("OpenCV failed to start: " + err.message + ". Try opening this page in Safari.");
      }
    }

    async function startCamera() {
      if (!cvReady) return;
      setStatus("Requesting camera...");
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();

        const ratio = (video.videoHeight || 480) / (video.videoWidth || 640);
        view.width = PROC_W;
        view.height = Math.round(PROC_W * ratio);

        streaming = true;
        startBtn.style.display = "none";
        setStatus("Detecting. Point the camera at your laptop screen.");
        requestAnimationFrame(processVideo);
      } catch (err) {
        setStatus("Could not start camera: " + err.name + " - " + err.message);
      }
    }

    function processVideo() {
      if (!streaming) return;
      try {
        ctx.drawImage(video, 0, 0, view.width, view.height);
        const src = cv.imread(view);
        detectAndDraw(src);
        cv.imshow(view, src);
        src.delete();
      } catch (err) {
        setStatus("Processing error: " + err.message);
        streaming = false;
        return;
      }
      requestAnimationFrame(processVideo);
    }

    function detectAndDraw(src) {
      const gray = new cv.Mat();
      const blurred = new cv.Mat();
      const edges = new cv.Mat();
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      const approx = new cv.Mat();

      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
      cv.Canny(blurred, edges, 50, 150);
      cv.dilate(edges, edges, KERNEL);
      cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      const frameArea = src.cols * src.rows;
      let bestArea = 0;
      let bestCorners = null;

      for (let i = 0; i < contours.size(); i++) {
        const c = contours.get(i);
        const area = cv.contourArea(c);
        if (area > 0.10 * frameArea && area > bestArea) {
          const peri = cv.arcLength(c, true);
          cv.approxPolyDP(c, approx, 0.02 * peri, true);
          if (approx.rows === 4 && cv.isContourConvex(approx)) {
            const pts = [];
            for (let j = 0; j < 4; j++) {
              pts.push([approx.data32S[j * 2], approx.data32S[j * 2 + 1]]);
            }
            bestArea = area;
            bestCorners = pts;
          }
        }
        c.delete();
      }

      if (bestCorners) {
        const green = new cv.Scalar(0, 255, 0, 255);
        const red = new cv.Scalar(255, 0, 0, 255);
        for (let j = 0; j < 4; j++) {
          const p1 = new cv.Point(bestCorners[j][0], bestCorners[j][1]);
          const p2 = new cv.Point(bestCorners[(j + 1) % 4][0], bestCorners[(j + 1) % 4][1]);
          cv.line(src, p1, p2, green, 2);
        }
        for (let j = 0; j < 4; j++) {
          cv.circle(src, new cv.Point(bestCorners[j][0], bestCorners[j][1]), 5, red, -1);
        }
      }

      gray.delete(); blurred.delete(); edges.delete();
      contours.delete(); hierarchy.delete(); approx.delete();
    }

    startBtn.addEventListener("click", startCamera);
  </script>
</body>
</html>
